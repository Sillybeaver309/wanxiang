<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>决战，万象剪山堂！</title>
<style>
    *{box-sizing:border-box;font-family:"Microsoft YaHei",sans-serif}
    body{background:#fdf6f0;color:#333;margin:0;padding:20px;text-align:center}
    .container{max-width:700px;margin:0 auto;background:#fff;padding:30px;border-radius:12px;box-shadow:0 0 10px rgba(0,0,0,0.1)}
    .btn{padding:12px 24px;margin:8px;font-size:16px;border:none;border-radius:8px;background:#c92f3e;color:#fff;cursor:pointer}
    .btn:disabled{background:#999}
    .countdown{font-size:24px;color:#c92f3e;font-weight:bold;margin:20px 0}
    .question{font-size:20px;margin:30px 0}
    .score{font-size:22px;font-weight:bold;margin-top:20px}
    .title{font-size:28px;color:#a21f2e}
    .tip{color:#666;font-size:14px;margin-top:8px}
    .question-img{max-width:280px;max-height:280px;margin:20px auto;display:block;border-radius:8px;border:2px solid #c92f3e}
    .time-bar{width:80%;height:6px;background:#eee;margin:10px auto;border-radius:3px;overflow:hidden}
    .time-progress{height:100%;background:#c92f3e;width:100%}
</style>
</head>
<body>

<audio id="bgm" loop>
    <source src="bgm.mp3" type="audio/mpeg">
</audio>

<div class="container">
    <div class="title">决战，万象剪山堂！</div>

    <div id="step1">
        <p>请选择你的剪纸阵营</p>
        <button class="btn" onclick="chooseCamp('北派')">北派</button>
        <button class="btn" onclick="chooseCamp('南派')">南派</button>
        <button class="btn" onclick="chooseCamp('融合派')">融合派</button>
        <p class="tip">此项分类纯属娱乐演绎</p>
    </div>

    <div id="step2" style="display:none">
        <div id="introText"></div>
        <div class="countdown" id="timer">5</div>
    </div>

    <div id="step3" style="display:none">
        <div class="score">当前得分：<span id="score">0</span></div>
        <div class="question">请判断这张作品是否属于你的阵营</div>
        <img id="workImg" class="question-img">
        <div class="time-bar"><div id="timeProgress" class="time-progress"></div></div>
        <button class="btn" onclick="check(true)">是我的阵营</button>
        <button class="btn" onclick="check(false)">不是我的阵营</button>
    </div>

    <div id="step4" style="display:none">
        <h2>游戏结束！</h2>
        <p style="font-size:22px">最终得分：<span id="finalScore">0</span> / 100</p>
        <button class="btn" onclick="location.reload()">再来一局</button>
    </div>
</div>

<script>
const data = {
    "北派": ["褐马鸡","丹凤朝阳","牛耕图","抓髻娃娃","乌鸦救主","蛙","嬷嬷人"],
    "南派": ["猪蹄花","帽檐花","海瑞","花引蝶","赛龙舟","舞狮"],
    "融合派": ["鹤舞云霄","桃花柳燕","蜡嘴牡丹","连年有鱼","老鼠娶亲","金牛奋蹄"]
}

const intro = {
    "北派": "荣子欢、沈念、孟页星，北派的传人！你们的代表作有：《褐马鸡》《丹凤朝阳》《牛耕图》《抓髻娃娃》《乌鸦救主》《蛙》《嬷嬷人》等。请认真辨别接下来的选项，坚定选择属于自己阵营的作品！",
    "南派": "夏艺柏、杨占英、金旭佳，南派的传人！你们的代表作有：《猪蹄花》《帽檐花》《海瑞》《花引蝶》《赛龙舟》《舞狮》等。认真辨别接下来的选项，坚定选择属于自己阵营的作品！",
    "融合派": "苏芷云、周洪北，融合派的传人！你们的代表作有：《鹤舞云霄》《桃花柳燕》《蜡嘴牡丹》《连年有鱼》《老鼠娶亲》《金牛奋蹄》等。认真辨别接下来的选项，坚定选择属于自己阵营的作品！"
}

let userCamp = ""
let score = 0
let round = 0
const totalRound = 10
let currentItem = ""
let allItems = []
let questionTimer, progressInterval

function buildAllItems(){
    allItems = []
    for(let c in data) data[c].forEach(i => allItems.push({name:i, camp:c}))
}

function chooseCamp(camp){
    userCamp = camp
    document.getElementById('step1').style.display = 'none'
    document.getElementById('step2').style.display = 'block'
    document.getElementById('introText').innerText = intro[camp]
    buildAllItems()
    startIntroTimer()
}

function startIntroTimer(){
    let t = 5
    const dom = document.getElementById('timer')
    const itv = setInterval(()=>{
        t--
        dom.innerText = t
        if(t <= 0){
            clearInterval(itv)
            document.getElementById('step2').style.display = 'none'
            document.getElementById('step3').style.display = 'block'
            try { document.getElementById('bgm').play() } catch(e){}
            nextRound()
        }
    }, 1000)
}

function startQuestionTimer(){
    clearTimeout(questionTimer)
    clearInterval(progressInterval)
    let width = 100
    const bar = document.getElementById('timeProgress')
    bar.style.width = "100%"

    progressInterval = setInterval(()=>{
        width -= 20
        bar.style.width = width + "%"
    },1000)

    questionTimer = setTimeout(()=>{
        check(null)
    },5000)
}

function nextRound(){
    if(round >= totalRound){
        clearTimeout(questionTimer)
        clearInterval(progressInterval)
        document.getElementById('step3').style.display = 'none'
        document.getElementById('step4').style.display = 'block'
        document.getElementById('finalScore').innerText = score
        return
    }
    const rand = allItems[Math.floor(Math.random()*allItems.length)]
    currentItem = rand
    document.getElementById('workImg').src = rand.name + ".jpg"
    round++
    startQuestionTimer()
}

function check(yes){
    clearTimeout(questionTimer)
    clearInterval(progressInterval)

    if(yes !== null){
        const isMine = currentItem.camp === userCamp
        if(isMine === yes) score += 10
    }

    document.getElementById('score').innerText = score
    setTimeout(nextRound, 300)
}
</script>
</body>
</html>
